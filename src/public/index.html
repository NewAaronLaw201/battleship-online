<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="双人联机战舰对战游戏" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>双人联机战舰</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <h1>双人联机战舰</h1>
          <p id="statusText">创建或加入房间开始游戏</p>
        </div>
        <div class="room-panel">
          <input id="playerNameInput" maxlength="12" placeholder="玩家昵称" />
          <button id="createRoomButton">创建房间</button>
          <input id="roomIdInput" maxlength="6" placeholder="房间号" />
          <button id="joinRoomButton">加入房间</button>
          <button id="leaveRoomButton" class="leave-room-btn" disabled>退出房间</button>
        </div>
      </section>

      <section class="info-strip">
        <div>
          <span class="label">房间</span>
          <strong id="roomIdText">-</strong>
        </div>
        <div>
          <span class="label">你</span>
          <strong id="youText">-</strong>
        </div>
        <div>
          <span class="label">对手</span>
          <strong id="opponentText">等待加入</strong>
        </div>
        <div>
          <span class="label">回合</span>
          <strong id="turnText">-</strong>
        </div>
      </section>

      <section class="setup-panel" id="setupPanel">
        <div class="setup-controls">
          <div>
            <span class="label">摆放方向</span>
            <div class="segmented">
              <button id="horizontalButton" class="active">横向</button>
              <button id="verticalButton">纵向</button>
            </div>
          </div>
          <div class="placement-controls">
          <button id="resetPlacementButton">重置</button>
          <button id="readyButton" disabled>准备</button>
        </div>
        <div class="ship-picker" id="shipPicker"></div>
      </section>

      <section class="game-layout">
        <section class="board-zone">
          <div class="section-title">
            <h2>我的棋盘</h2>
            <span>显示我方军舰与敌方攻击结果</span>
          </div>
          <div id="ownBoard" class="board"></div>
        </section>

        <section class="board-zone">
          <div class="section-title">
            <h2>攻击棋盘</h2>
            <span>选择未攻击过的位置</span>
          </div>
          <div id="attackBoard" class="board attack-board"></div>
        </section>

        <aside class="side-panel">
          <div class="section-title">
            <h2>道具</h2>
            <span>当前版本预留</span>
          </div>
          <div id="inventoryList" class="inventory-list">
            <div class="empty-inventory">暂无道具</div>
          </div>
          <div class="section-title log-title">
            <h2>战况</h2>
          </div>
          <div id="eventLog" class="event-log"></div>
          <button id="nextRoundButton" class="next-round-btn" style="display: none;">下一局</button>
        </aside>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
  </body>
</html>
